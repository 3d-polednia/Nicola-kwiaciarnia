media:
  input: assets
  output: assets

content:
  - name: content
    label: Treść strony
    type: file
    path: data/content.json
    format: json
    fields:
      - name: logo
        label: Logo
        type: image
        required: false
      - name: hero
        label: "Zdjęcie główne (hero)"
        type: image
        required: false
      - name: contact
        label: "Zdjęcie przy kontakcie"
        type: image
        required: false
      - name: pricing
        label: Cennik
        type: object
        list: true
        fields:
          - { name: name, label: "Nazwa usługi", type: string, required: true }
          - { name: note, label: "Dopisek w nawiasie (opcjonalnie)", type: string, required: false }
          - { name: price, label: "Cena (np. „od 80 zł”)", type: string, required: true }
      - name: gallery
        label: Galeria zdjęć
        type: object
        list: true
        fields:
          - { name: photo, label: Zdjęcie, type: image, required: true }
